<html lang="en">
<head>

          theme: {
            extend: {
              "colors": {

                      "background": "#f8f9ff"

                      "body-main": ["Inter"],

              }
            }

    <style>
        .reveal-anim { animation: scanline 0.6s ease-out; }

            0% { background-color: #059669; color: white; }
            100% { background-color: white; }
        }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-checkbox:checked { background-color: #a855f7; border-color: #a855f7; }
        .locked-row { opacity: 0.6; background-color: #f1f5f9; }
        .bankruptcy-alert { animation: bankruptcy-pulse 1s linear infinite; color: #dc2626 !important; font-weight: 900; }
        @keyframes bankruptcy-pulse { 50% { opacity: 0.5; } }
        .btn-action {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 10px 16px; border-radius: 12px; font-weight: 700; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s;
        }
        .btn-action:active { transform: scale(0.95); }

<body class="bg-[#f8f9ff] text-slate-900 font-body-main antialiased min-h-screen flex flex-col">

<nav class="flex justify-between items-center w-full px-8 h-16 sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
    <div class="flex items-center gap-8 h-full">
        <h1 class="text-lg font-black tracking-tighter uppercase">Market Gauntlet</h1>
        <div class="hidden md:flex items-center gap-1 h-full">
            <button id="tab-period6" onclick="switchPeriod('period6')" class="px-4 py-5 font-bold text-[11px] uppercase tracking-widest border-b-4 border-primary text-primary bg-blue-50/50">Period 6</button>
            <button id="tab-period8" onclick="switchPeriod('period8')" class="px-4 py-5 font-bold text-[11px] uppercase tracking-widest border-b-4 border-transparent text-slate-500 hover:text-primary">Period 8</button>

        </div>
    </div>
    
    <div class="flex items-center gap-4">

            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>

    </div>
</nav>

                    </thead>
                    <tbody id="teamBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </section>
        </div>
    </div>
</main>

<main id="archive-view" class="hidden flex-1 p-8 overflow-y-auto bg-slate-100">

</main>

    // Standard Logic preserved
    function generateRandomAlloc() { let p = [0, 100]; for (let i = 0; i < 4; i++) p.push(Math.floor(Math.random() * 101)); p.sort((a,b)=>a-b); return { idx: p[1]-p[0], tch: p[2]-p[1], reit: p[3]-p[2], bnd: p[4]-p[3], cry: p[5]-p[4] }; }

    function initializeMarketDeck(s) { const bullCount = Math.random() > 0.5 ? 7 : 6; const bearCount = (bullCount === 7) ? 2 : 3; let deck = [ ...marketPool.bull.sort(() => Math.random() - 0.5).slice(0, bullCount), ...marketPool.bear.sort(() => Math.random() - 0.5).slice(0, bearCount), ...marketPool.neutral.sort(() => Math.random() - 0.5).slice(0, 1) ].sort(() => Math.random() - 0.5); const bIdx = deck.findIndex(y => marketPool.bear.some(by => by.year === y.year)); const tIdx = 6 + Math.floor(Math.random() * 4); [deck[bIdx], deck[tIdx]] = [deck[tIdx], deck[bIdx]]; s.marketDeck = deck; }
    function syncAlloc(i, f, v) { gameState[currentPeriod].teams[i].alloc[f] = parseInt(v) || 0; saveData(); }
    function toggleReady(i) { let t = gameState[currentPeriod].teams[i]; if (!t.ready && (Object.values(t.alloc).reduce((a,b)=>a+b,0) !== 100)) { alert("Must total 100%"); return; } t.ready = !t.ready; saveData(); render(); }

        sorted.forEach((t) => {
            let rIdx = gameState[currentPeriod].teams.indexOf(t);
            let dis = (s.pendingEvent === null || s.year > 10 || s.completed || t.ready);
            let inCls = `w-14 border-slate-200 rounded-lg text-center font-bold text-sm ${t.ready?'bg-slate-100':'bg-white'}`;
            let isBK = t.balance < 1000;
            let index = sorted.indexOf(t);
            let diff = t.balance - t.lastBalance;
            let badge = (s.year > 1) ? (diff >= 0 ? `<span class="text-[9px] text-emerald-600 font-black">▲ $${Math.round(diff).toLocaleString()}</span>` : `<span class="text-[9px] text-red-600 font-black">▼ $${Math.abs(Math.round(diff)).toLocaleString()}</span>`) : '';
            b.innerHTML += `<tr class="border-b border-slate-100 ${t.ready ? 'locked-row' : ''} ${index===0 && s.teams.length>0 ? 'leader-row' : ''}">
                <td class="p-4 font-black text-slate-900 truncate">${index===0 && s.teams.length>0 ? '👑 ' : ''}${t.name}</td>
                <td class="p-4 text-right pr-8"><div class="flex flex-col"><span class="font-data-leaderboard text-2xl ${isBK?'bankruptcy-alert':'text-emerald-700'}">$${Math.round(t.balance).toLocaleString()}</span>${badge}</div></td>
                <td class="p-1 text-center"><input type="number" value="${t.alloc.idx}" oninput="syncAlloc(${rIdx},'idx',this.value)" class="${inCls}" ${dis?'disabled':''}></td>
                <td class="p-1 text-center"><input type="number" value="${t.alloc.tch}" oninput="syncAlloc(${rIdx},'tch',this.value)" class="${inCls}" ${dis?'disabled':''}></td>
                <td class="p-1 text-center"><input type="number" value="${t.alloc.reit}" oninput="syncAlloc(${rIdx},'reit',this.value)" class="${inCls}" ${dis?'disabled':''}></td>
                <td class="p-1 text-center"><input type="number" value="${t.alloc.bnd}" oninput="syncAlloc(${rIdx},'bnd',this.value)" class="${inCls}" ${dis?'disabled':''}></td>
                <td class="p-1 text-center"><input type="number" value="${t.alloc.cry}" oninput="syncAlloc(${rIdx},'cry',this.value)" class="${inCls}" ${dis?'disabled':''}></td>
                <td class="p-1 text-center"><input type="checkbox" class="w-4 h-4 rounded border-slate-300 custom-checkbox" ${t.vault==='roth'?'checked':''} ${s.year > 1 ? 'disabled' : ''} onchange="gameState['${currentPeriod}'].teams[${rIdx}].vault=this.checked?'roth':'trad'; gameState['${currentPeriod}'].teams[${rIdx}].balance=this.checked?80000:100000; gameState['${currentPeriod}'].teams[${rIdx}].lastBalance=this.checked?80000:100000; saveData(); render();"></td>
                <td class="p-1 text-center"><button onclick="toggleReady(${rIdx})" class="${t.ready?'bg-emerald-600':'bg-slate-200'} text-white px-3 py-2 rounded-xl text-[10px] font-black uppercase">Ready</button></td>
                <td class="p-1 text-center"><button onclick="removeTeam(${rIdx})" class="text-slate-300 hover:text-error"><svg class="w-4 h-4 mx-auto" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"/></svg></button></td></tr>`;
        });
    }
    window.onload = loadData;
</script>
</body>
</html>
